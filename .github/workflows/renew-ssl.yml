name: Renew SSL

on:
  schedule:
    - cron: '0 0 */10 * *'
  workflow_dispatch:

jobs:
  ssl:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Trigger GitHub Pages certificate issuance
        run: |
          gh api repos/spivanatalie64/acreetionos-blog/pages -X PUT \
            -f cname='blog.natalie.acreetionos.org'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Wait for certificate to be issued
        run: |
          for i in $(seq 1 90); do
            state=$(gh api repos/spivanatalie64/acreetionos-blog/pages \
              --jq '.https_certificate?.state // "null"')
            echo "[$i/90] Certificate: $state"
            if [ "$state" = "approved" ]; then
              echo "✓ SSL certificate issued!"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Timed out waiting for certificate"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify HTTPS is live
        run: |
          curl -sIo /dev/null -w "%{http_code} %{redirect_url}" \
            "https://blog.natalie.acreetionos.org"
          echo ""
          echo "✓ HTTPS is live"
