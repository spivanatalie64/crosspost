name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths: [workers/**, .github/workflows/deploy-worker.yml]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy worker
        run: |
          python3 -c "
import json
with open('workers/proxy-worker.js') as f:
    print(json.dumps({'script': f.read()}))
" > /tmp/worker-body.json

          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/blog-proxy" \
            -H "X-Auth-Email: ${{ secrets.CLOUDFLARE_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CLOUDFLARE_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data @/tmp/worker-body.json | python3 -c "import sys,json; r=json.load(sys.stdin); print('✓' if r.get('success') else '✗', r.get('errors',''))"

      - name: Set route
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/workers/routes" \
            -H "X-Auth-Email: ${{ secrets.CLOUDFLARE_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CLOUDFLARE_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"pattern":"blog.natalie.acreetionos.org/*","script":"blog-proxy"}' | python3 -c "import sys,json; r=json.load(sys.stdin); print('✓' if r.get('success') else '✗', r.get('errors',''))"
