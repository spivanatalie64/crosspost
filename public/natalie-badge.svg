<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 65" width="280" height="65">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#0d1a0d"/>
    </linearGradient>
    <linearGradient id="n-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="50%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#1a8a4a"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- outer glow -->
  <rect x="2" y="2" width="276" height="61" rx="30" fill="url(#glow)" opacity="0.3"/>

  <!-- main shield body -->
  <rect x="4" y="4" width="272" height="57" rx="28" fill="url(#bg-grad)" stroke="#2ecc71" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- circuit trace left -->
  <path d="M20 20 L30 20 L30 32 L40 32" stroke="#2ecc71" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="18" cy="20" r="1.5" fill="#2ecc71" opacity="0.3"/>
  <circle cx="42" cy="32" r="1.5" fill="#2ecc71" opacity="0.3"/>

  <!-- circuit trace right -->
  <path d="M260 42 L250 42 L250 30 L240 30" stroke="#2ecc71" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="262" cy="42" r="1.5" fill="#2ecc71" opacity="0.3"/>
  <circle cx="238" cy="30" r="1.5" fill="#2ecc71" opacity="0.3"/>

  <!-- decorative diamond dots -->
  <polygon points="140,10 143,13 140,16 137,13" fill="#2ecc71" opacity="0.2"/>
  <polygon points="140,49 143,52 140,55 137,52" fill="#2ecc71" opacity="0.2"/>

  <!-- N monogram shield -->
  <g transform="translate(12, 12)">
    <rect x="0" y="0" width="41" height="41" rx="10" fill="rgba(46,204,113,0.08)" stroke="#2ecc71" stroke-width="1.5" stroke-opacity="0.4"/>
    <rect x="3" y="3" width="35" height="35" rx="7" fill="none" stroke="#2ecc71" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="20.5" y="28" font-family="'Fira Code', monospace" font-size="26" fill="url(#n-grad)" font-weight="800" text-anchor="middle">N</text>
  </g>

  <!-- "MAINTAINED BY" line -->
  <text x="68" y="22" font-family="'Fira Code', monospace" font-size="7" fill="#2ecc71" fill-opacity="0.5" letter-spacing="3" font-weight="500">◆ MAINTAINED BY ◆</text>

  <!-- Natalie Spiva name -->
  <text x="68" y="43" font-family="'Fira Code', monospace" font-size="16" fill="#e5e5e5" font-weight="700" letter-spacing="0.5">Natalie Spiva</text>

  <!-- small green underline accent -->
  <line x1="68" y1="49" x2="198" y2="49" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.2"/>

  <!-- right decorative emblems -->
  <g transform="translate(228, 12)">
    <rect x="0" y="0" width="41" height="41" rx="10" fill="rgba(46,204,113,0.05)" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.2"/>
    <text x="20.5" y="20" font-family="'Fira Code', monospace" font-size="10" fill="#2ecc71" fill-opacity="0.25" text-anchor="middle" font-weight="500">♥</text>
    <text x="20.5" y="33" font-family="'Fira Code', monospace" font-size="7" fill="#2ecc71" fill-opacity="0.2" text-anchor="middle">CODE</text>
  </g>

  <!-- inner border glow -->
  <rect x="5" y="5" width="270" height="55" rx="27" fill="none" stroke="#2ecc71" stroke-width="0.5" stroke-opacity="0.1"/>
</svg>
